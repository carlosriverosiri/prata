# ci-drift-gate.example.yml — a copy-paste CI job that enforces the doc-freshness
# system. Drop the jobs into your existing GitHub Actions workflow (or adapt the
# steps to GitLab CI / any runner). Two gates:
#
#   1. doc-asserts (HARD)  — run check-docs.sh over the PR range; Layer B fails CI
#      when a documented load-bearing fact has drifted from the code/config.
#   2. context-pack drift  — regenerate the pack into a SCRATCH path and compare with
#      `git diff --no-index`. Diffing to scratch (not redirecting into the tracked
#      file) means a generator crash can't truncate the committed baseline.
#
# The generator step shows Go (the reference impl). Swap it for your stack's one
# command; everything else is language-agnostic.

name: docs

on:
  pull_request:
  push:
    branches: [main]

jobs:
  doc-asserts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need history so BASE_REF...HEAD resolves
      - name: Run doc-freshness assertions (Layer B is the hard gate)
        env:
          BASE_REF: origin/${{ github.base_ref || 'main' }}
        run: bash freshness/check-docs.sh

  context-pack-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5           # <-- replace with your stack's toolchain
        with:
          go-version: stable
      - name: Regenerate the context pack into a scratch path and diff
        run: |
          set -euo pipefail
          scratch="$(mktemp)"
          # vvv replace this one line with your generator's command vvv
          go run ./cmd/gen-context-pack > "$scratch"
          # ^^^ a non-zero exit here (e.g. a NOT-FOUND pinned fact) also fails CI ^^^
          if ! git --no-pager diff --no-index --exit-code CONTEXT-PACK.md "$scratch"; then
            echo "::error::CONTEXT-PACK.md is stale — run the generator and commit the result."
            exit 1
          fi
