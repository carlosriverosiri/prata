name: CI

on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, vet, and test
    # Windows-only: the app uses WASAPI capture (cgo) and Win32 syscalls
    # that do not compile on Linux runners.
    runs-on: windows-latest
    env:
      CGO_ENABLED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Check formatting
        shell: bash
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1

  docs:
    name: Context-pack drift gate
    # Runs on Linux: cmd/gen-context-pack is stdlib-only and OS-independent, so it
    # builds here even though the daemon (cgo + Win32) does not. This keeps the
    # doc-vs-code drift check fast and independent of the Windows build.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Unit-test the generator
        run: go test ./cmd/gen-context-pack/ -count=1

      - name: Regenerate the context pack
        run: go run ./cmd/gen-context-pack > CONTEXT-PACK.md

      - name: Fail on drift
        shell: bash
        run: |
          if ! git diff --exit-code CONTEXT-PACK.md; then
            echo "::error::CONTEXT-PACK.md is stale. A constant or the module path changed"
            echo "::error::in code but the pack was not regenerated. Run:"
            echo "::error::  go run ./cmd/gen-context-pack > CONTEXT-PACK.md"
            echo "::error::and commit the result."
            exit 1
          fi
