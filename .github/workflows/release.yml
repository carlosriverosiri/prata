name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Show toolchain versions
        run: |
          go version
          gcc --version

      - name: Build prata.exe
        env:
          CGO_ENABLED: 1
        run: go build -ldflags="-s -w -H windowsgui" -o prata.exe ./cmd/prata/

      - name: Build prata-setkey.exe
        env:
          CGO_ENABLED: 1
        run: go build -ldflags="-s -w" -o prata-setkey.exe ./cmd/prata-setkey/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            prata.exe
            prata-setkey.exe
            dictionary-corrections.txt
            install.ps1
