name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Show toolchain versions
        run: |
          go version
          gcc --version

      - name: Check formatting
        shell: bash
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build all packages
        run: go build ./...

      - name: Test
        run: go test ./... -count=1

      - name: Build prata.exe
        env:
          CGO_ENABLED: 1
        run: go build -ldflags="-s -w -H windowsgui -X main.version=${{ github.ref_name }}" -o prata.exe ./cmd/prata/

      - name: Build prata-setkey.exe
        env:
          CGO_ENABLED: 1
        run: go build -ldflags="-s -w" -o prata-setkey.exe ./cmd/prata-setkey/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            prata.exe
            prata-setkey.exe
            dictionary-corrections.txt
            install.ps1
