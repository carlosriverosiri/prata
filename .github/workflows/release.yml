name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: windows-latest
    env:
      # Mapped from the secret so the optional signing step can gate on it via
      # env (secrets are not available in a step `if`). Empty until a
      # code-signing cert exists, which keeps signing a deferred no-op.
      CODE_SIGN_PFX: ${{ secrets.CODE_SIGN_PFX }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Show toolchain versions
        run: |
          go version
          gcc --version

      - name: Check formatting
        shell: bash
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build all packages
        run: go build ./...

      - name: Test
        run: go test ./... -count=1

      - name: Build prata.exe
        env:
          CGO_ENABLED: 1
        run: go build -ldflags="-s -w -H windowsgui -X main.version=${{ github.ref_name }}" -o prata.exe ./cmd/prata/

      - name: Sign prata.exe (deferred no-op until a code-signing cert exists)
        if: ${{ env.CODE_SIGN_PFX != '' }}
        shell: pwsh
        env:
          CODE_SIGN_PASSWORD: ${{ secrets.CODE_SIGN_PASSWORD }}
        run: |
          $bytes = [Convert]::FromBase64String($env:CODE_SIGN_PFX)
          $pfx = Join-Path $env:RUNNER_TEMP 'cert.pfx'
          [IO.File]::WriteAllBytes($pfx, $bytes)
          & signtool sign /f $pfx /p $env:CODE_SIGN_PASSWORD /fd SHA256 `
            /tr http://timestamp.digicert.com /td SHA256 prata.exe

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            prata.exe
            Installera-Prata.bat
            Avinstallera-Prata.bat
